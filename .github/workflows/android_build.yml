name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build Project with Gradle
        # سنقوم بتثبيت gradle ثم بناء المشروع
        run: |
          # الانتقال للمجلد الصحيح
          cd LandscapeDesignApp/LandscapeDesignApp
          
          # تثبيت gradle محلياً إذا لم يكن موجوداً
          gradle wrapper
          
          # إعدادات التوافق
          echo "kotlin.plugin.suppressVersionCompatibilityCheck=true" >> gradle.properties
          
          # تنفيذ البناء
          chmod +x gradlew
          ./gradlew assembleDebug -Pandroid.useAndroidX=true -Pandroid.enableJetifier=true -x lint

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Landscaping-App
          path: "**/build/outputs/apk/debug/app-debug.apk"
