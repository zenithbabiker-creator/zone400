name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Gradle and Build
        run: |
          # 1. تثبيت محرك Gradle يدوياً لعدم وجود gradlew
          echo "Installing Gradle..."
          wget -q https://services.gradle.org/distributions/gradle-8.7-bin.zip
          unzip -q gradle-8.7-bin.zip
          GRADLE_BIN=$(pwd)/gradle-8.7/bin/gradle
          
          # 2. البحث عن المجلد الذي يحتوي على مشروع الأندرويد
          BUILD_FILE=$(find . -name "build.gradle*" | head -n 1)
          PROJECT_DIR=$(dirname "$BUILD_FILE")
          cd "$PROJECT_DIR"
          
          # 3. إصلاح ملف Manifest (الأيقونة والتعارضات)
          MANIFEST_PATH="app/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST_PATH" ]; then
            sed -i 's|android:icon="@mipmap/ic_launcher"|android:icon="@android:drawable/sym_def_app_icon"|g' "$MANIFEST_PATH"
            sed -i 's|<manifest |<manifest xmlns:tools="http://schemas.android.com/tools" |g' "$MANIFEST_PATH"
            sed -i 's|android:name="com.google.ar.core"|android:name="com.google.ar.core" tools:replace="android:value"|g' "$MANIFEST_PATH"
          fi
          
          # 4. تنفيذ البناء باستخدام Gradle المثبت
          $GRADLE_BIN clean assembleDebug \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=1g" \
            -Pandroid.useAndroidX=true \
            -Pandroid.enableJetifier=true \
            -x lint -x test

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LandscapeDesignApp
          path: "**/app-debug.apk"
