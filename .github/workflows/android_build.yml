name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build Project
        run: |
          cd LandscapeDesignApp/LandscapeDesignApp
          
          # 1. تحديث إعدادات الذاكرة والتوافق (لحل مشكلة الذاكرة وتوافق Kotlin)
          echo "org.gradle.jvmargs=-Xmx3072m -XX:MaxMetaspaceSize=512m -Dfile.encoding=UTF-8" > gradle.properties
          echo "kotlin.plugin.suppressVersionCompatibilityCheck=true" >> gradle.properties
          echo "android.suppressUnsupportedCompileSdk=34" >> gradle.properties
          
          # 2. إنشاء gradle wrapper
          gradle wrapper
          
          # 3. البناء
          chmod +x gradlew
          ./gradlew assembleDebug \
            -Pandroid.useAndroidX=true \
            -Pandroid.enableJetifier=true \
            -x lint

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Landscaping-App
          path: "**/build/outputs/apk/debug/app-debug.apk"
