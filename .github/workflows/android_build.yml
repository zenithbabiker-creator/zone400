name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Build Project
        run: |
          # العودة للمجلد الرئيسي حيث يوجد ملف gradlew
          cd .
          
          # التحقق من وجود الملف في المجلد الحالي
          if [ -f "gradlew" ]; then
            echo "Gradlew found in root!"
          else
            echo "Error: gradlew not found in root!"
            exit 1
          fi
          
          # إعدادات التوافق
          echo "kotlin.plugin.suppressVersionCompatibilityCheck=true" >> gradle.properties
          
          # تنفيذ البناء للمشروع الموجود في المجلد الفرعي
          chmod +x gradlew
          ./gradlew :LandscapeDesignApp:LandscapeDesignApp:assembleDebug \
            -Pandroid.useAndroidX=true \
            -Pandroid.enableJetifier=true \
            -Dorg.gradle.jvmargs="-Xmx2048m -XX:MaxMetaspaceSize=512m" \
            -x lint

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Landscaping-App
          path: "**/build/outputs/apk/debug/app-debug.apk"
