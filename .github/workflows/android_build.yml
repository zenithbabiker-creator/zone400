name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: 
  
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build Project
        run: |
          cd LandscapeDesignApp/LandscapeDesignApp
          
          # 1. تحديث إعدادات الذاكرة للـ Gradle لتجنب خطأ Garbage Collector
          echo "org.gradle.jvmargs=-Xmx3072m -XX:MaxMetaspaceSize=512m" > gradle.properties
          
          # 2. إنشاء ملف مانيفست نظيف ومتوافق (مع تجاهل الـ package namespace)
          cat <<EOF > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              xmlns:tools="http://schemas.android.com/tools">
              
              <uses-permission android:name="android.permission.CAMERA" />
              <uses-feature android:name="android.hardware.camera.ar" android:required="true" />
              
              <application 
                  android:allowBackup="true" 
                  android:icon="@android:mipmap/sym_def_app_icon" 
                  android:label="LandscapeDesign" 
                  android:theme="@style/Theme.LandscapeDesign">
                  
                  <meta-data 
                      android:name="com.google.ar.core" 
                      android:value="required" 
                      tools:replace="android:value" />
                      
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF
          
          # 3. بناء المشروع باستخدام الـ Wrapper
          gradle wrapper
          chmod +x gradlew
          ./gradlew assembleDebug -Pandroid.useAndroidX=true -Pandroid.enableJetifier=true -x lint

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Landscaping-App
          path: "**/build/outputs/apk/debug/app-debug.apk"
