name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Grant execute permission and Build
        run: |
          # 1. البحث عن موقع ملف gradlew ومنحه الصلاحية
          GRADLEW_PATH=$(find . -name "gradlew" | head -n 1)
          chmod +x "$GRADLEW_PATH"
          
          # 2. البحث عن المجلد الذي يحتوي على ملف Manifest لإصلاحه
          MANIFEST_PATH=$(find . -name "AndroidManifest.xml" | head -n 1)
          
          if [ -f "$MANIFEST_PATH" ]; then
            sed -i 's|android:icon="@mipmap/ic_launcher"|android:icon="@android:drawable/sym_def_app_icon"|g' "$MANIFEST_PATH"
            sed -i 's|<manifest |<manifest xmlns:tools="http://schemas.android.com/tools" |g' "$MANIFEST_PATH"
            sed -i 's|android:name="com.google.ar.core"|android:name="com.google.ar.core" tools:replace="android:value"|g' "$MANIFEST_PATH"
          fi
          
          # 3. تنفيذ البناء من المجلد الذي يحتوي على gradlew
          # الحصول على مجلد الأب لملف gradlew
          GRADLEW_DIR=$(dirname "$GRADLEW_PATH")
          cd "$GRADLEW_DIR"
          
          ./gradlew clean assembleDebug \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=1g" \
            -Pandroid.useAndroidX=true \
            -Pandroid.enableJetifier=true \
            -x lint -x test

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LandscapeDesignApp
          path: "**/app-debug.apk"
