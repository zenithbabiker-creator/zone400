name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Grant execute permission for gradlew
        run: |
          # سنقوم بالبحث عن مكان وجود الملف وتصحيح الصلاحيات أينما كان
          find . -name "gradlew" -exec chmod +x {} \;

      - name: Build with Gradle
        run: |
          # نحدد المسار الذي يحتوي على ملف build.gradle
          # سنقوم بالبحث عن المجلد الذي يحتوي على المشروع
          PROJECT_DIR=$(find . -name "build.gradle*" -exec dirname {} \; | head -n 1)
          cd "$PROJECT_DIR"
          
          # 1. إصلاح ملف Manifest للتعارضات والأيقونة
          # نستخدم المسار النسبي بناءً على موقع ملف build.gradle
          MANIFEST_PATH="app/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST_PATH" ]; then
            sed -i 's|android:icon="@mipmap/ic_launcher"|android:icon="@android:drawable/sym_def_app_icon"|g' "$MANIFEST_PATH"
            sed -i 's|<manifest |<manifest xmlns:tools="http://schemas.android.com/tools" |g' "$MANIFEST_PATH"
            sed -i 's|android:name="com.google.ar.core"|android:name="com.google.ar.core" tools:replace="android:value"|g' "$MANIFEST_PATH"
          fi
          
          # 2. البناء مع تمرير الذاكرة وتخطي الاختبارات
          ./gradlew clean assembleDebug \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=1g" \
            -Pandroid.useAndroidX=true \
            -Pandroid.enableJetifier=true \
            -x lint -x test

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LandscapeDesignApp
          # البحث عن ملف الـ APK الناتج في أي مكان داخل المجلد
          path: "**/app-debug.apk"
