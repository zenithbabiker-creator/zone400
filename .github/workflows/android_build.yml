- name: Find Project and Build
      run: |
        # البحث عن ملف gradlew في أي مكان داخل المشروع
        GRADLEW_PATH=$(find . -name "gradlew" -print -quit)
        PROJECT_DIR=$(dirname "$GRADLEW_PATH")
        cd "$PROJECT_DIR"
        echo "Working directory is: $(pwd)"
        
        # 1. إصلاحات الـ Manifest والأيقونات
        # نبحث عن المسار الصحيح للمانيفست بالنسبة لمجلد الـ gradlew
        MANIFEST_PATH=$(find . -name "AndroidManifest.xml" | grep "app/src/main" | head -n 1)
        if [ -f "$MANIFEST_PATH" ]; then
          sed -i 's|xmlns:tools="http://schemas.android.com/tools"||g' "$MANIFEST_PATH"
          sed -i 's|<manifest|<manifest xmlns:tools="http://schemas.android.com/tools"|g' "$MANIFEST_PATH"
          sed -i 's|android:name="com.google.ar.core"|android:name="com.google.ar.core" tools:replace="android:value"|g' "$MANIFEST_PATH"
          sed -i 's|android:icon="@mipmap/ic_launcher"|android:icon="@android:mipmap/sym_def_app_icon"|g' "$MANIFEST_PATH"
          sed -i 's|android:roundIcon="@mipmap/ic_launcher_round"|android:roundIcon="@android:mipmap/sym_def_app_icon"|g' "$MANIFEST_PATH"
        fi

        # 2. إعدادات التوافق
        echo "kotlin.plugin.suppressVersionCompatibilityCheck=true" >> gradle.properties
        
        # 3. بناء المشروع
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon \
          -Pandroid.useAndroidX=true \
          -Pandroid.enableJetifier=true \
          -Dorg.gradle.jvmargs="-Xmx2048m -XX:MaxMetaspaceSize=512m" \
          -x lint
