name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build Project
        run: |
          cd LandscapeDesignApp/LandscapeDesignApp
          
          # 1. إصلاح تعارض المانيفست (إضافة tools:replace)
          sed -i 's|android:value="required"|android:value="required" tools:replace="android:value"|g' app/src/main/AndroidManifest.xml
          
          # 2. توليد gradlew والبناء
          gradle wrapper
          echo "kotlin.plugin.suppressVersionCompatibilityCheck=true" >> gradle.properties
          
          chmod +x gradlew
          ./gradlew assembleDebug -Pandroid.useAndroidX=true -Pandroid.enableJetifier=true -x lint

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Landscaping-App
          path: "**/build/outputs/apk/debug/app-debug.apk"
