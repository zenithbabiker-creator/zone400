name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build with Gradle
        run: |
          # تنظيف الكاش القديم تماماً لتجنب خطأ Dexing
          rm -rf ~/.gradle/caches/
          
          echo "org.gradle.jvmargs=-Xmx6g -XX:MaxMetaspaceSize=2g" > gradle.properties
          cd LandscapeDesignApp/LandscapeDesignApp
          
          # إصلاحات الـ Manifest
          sed -i 's|android:icon="@mipmap/ic_launcher"|android:icon="@android:drawable/sym_def_app_icon"|g' app/src/main/AndroidManifest.xml
          sed -i 's|<manifest |<manifest xmlns:tools="http://schemas.android.com/tools" |g' app/src/main/AndroidManifest.xml
          sed -i 's|android:name="com.google.ar.core"|android:name="com.google.ar.core" tools:replace="android:value"|g' app/src/main/AndroidManifest.xml
          
          # البناء مع تنظيف شامل
          gradle clean assembleDebug --no-daemon -Pandroid.useAndroidX=true -Pandroid.enableJetifier=true -x lint -x test

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LandscapeDesignApp
          path: LandscapeDesignApp/LandscapeDesignApp/app/build/outputs/apk/debug/app-debug.apk
