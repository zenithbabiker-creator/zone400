name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: 'gradle'

    - name: Find Project Root and Build
      run: |
        # البحث عن ملف settings.gradle لتحديد مجلد المشروع الحقيقي
        SETTINGS_FILE=$(find . -name "settings.gradle*" -print -quit)
        if [ -z "$SETTINGS_FILE" ]; then
          echo "Error: Could not find settings.gradle file."
          exit 1
        fi
        
        # الانتقال إلى المجلد الذي يحتوي على المشروع
        PROJECT_DIR=$(dirname "$SETTINGS_FILE")
        echo "Project found in: $PROJECT_DIR"
        cd "$PROJECT_DIR"
        
        # التأكد من وجود ملف gradlew وجعله قابلاً للتنفيذ
        if [ ! -f "gradlew" ]; then
            chmod +x gradlew || echo "gradlew not found, will use system gradle"
        fi

        # تنفيذ البناء
        ./gradlew assembleDebug --no-daemon

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Landscaping-App-Debug-APK
        # البحث عن ملف الـ APK الناتج في أي مكان داخل مجلد المشروع
        path: "**/build/outputs/apk/debug/app-debug.apk"
        retention-days: 7
