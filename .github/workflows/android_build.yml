# 2. إصلاح تعارض الـ Manifest بإضافة xmlns:tools وتعديل الـ meta-data
        MANIFEST_PATH="app/src/main/AndroidManifest.xml"
        if [ -f "$MANIFEST_PATH" ]; then
          # إضافة تعريف xmlns:tools إذا لم يكن موجوداً
          sed -i 's|<manifest|<manifest xmlns:tools="http://schemas.android.com/tools"|g' "$MANIFEST_PATH"
          
          # تعديل السطر ليحتوي على tools:replace بشكل صحيح
          # نبحث عن السطر الذي يحتوي على com.google.ar.core ونستبدله بالسطر المدعم بـ tools:replace
          sed -i 's|android:name="com.google.ar.core"|android:name="com.google.ar.core" tools:replace="android:value"|g' "$MANIFEST_PATH"
          
          echo "Applied fix with namespace to AndroidManifest.xml"
          cat "$MANIFEST_PATH" # طباعة الملف للتحقق من التغييرات في السجل
        fi
