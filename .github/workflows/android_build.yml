name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # إعداد الـ Java الإصدار المستقر 17
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: 'gradle'

    # توليد ملف الـ Wrapper بالنسخة المتوافقة 8.7 دون لمس الأكواد
    - name: Generate and Update Gradle Wrapper
      run: |
        SETTINGS_PATH=$(find . -name "settings.gradle*" -print -quit)
        if [ -z "$SETTINGS_PATH" ]; then
          APP_PATH=$(find . -name "app" -type d -print -quit)
          if [ -z "$APP_PATH" ]; then
            TARGET_DIR="."
          else
            TARGET_DIR=$(dirname "$APP_PATH")
          fi
        else
          TARGET_DIR=$(dirname "$SETTINGS_PATH")
        fi
        
        cd "$TARGET_DIR"
        gradle wrapper --gradle-version 8.7 --distribution-type all
        chmod +x gradlew

    # ترقيع المانيفست لحل تعارض ARCore وتهيئة الخصائص
    - name: Patch Manifest and Configure Gradle Properties
      run: |
        GRADLEW_PATH=$(find . -name gradlew -print -quit)
        PROJECT_ROOT=$(dirname "$GRADLEW_PATH")
        cd "$PROJECT_ROOT"
        
        # 1. تفعيل خصائص أندرويد إكس وإعدادات الذاكرة لتسريع البناء
        echo "android.useAndroidX=true" > gradle.properties
        echo "android.enableJetifier=true" >> gradle.properties
        echo "org.gradle.jvmargs=-Xmx3072m -XX:MaxMetaspaceSize=768m" >> gradle.properties

        # 2. تعديل ملف المانيفست برمجياً وحقن tools:replace لحل مشكلة تعارض قيمة com.google.ar.core
        MANIFEST_PATH=$(find . -name "AndroidManifest.xml" -print -quit)
        if [ -f "$MANIFEST_PATH" ]; then
          echo "Patching AndroidManifest.xml to fix ARCore conflict..."
          # إضافة مساحة الأسماء tools إن لم تكن موجودة
          sed -i 's|<manifest|<manifest xmlns:tools="http://schemas.android.com/tools"|g' "$MANIFEST_PATH"
          sed -i 's|xmlns:tools="http://schemas.android.com/tools" xmlns:tools="http://schemas.android.com/tools"|xmlns:tools="http://schemas.android.com/tools"|g' "$MANIFEST_PATH"
          # حقن خاصية الاستبدال لحل التعارض داخل عنصر meta-data
          sed -i 's|android:name="com.google.ar.core"|android:name="com.google.ar.core" tools:replace="android:value"|g' "$MANIFEST_PATH"
        fi

        # 3. حقن اعتمادات التوافق الآمنة لـ Compose إن لم تكن متوفرة
        APP_GRADLE=$(find . -name "build.gradle.kts" | grep "app/build.gradle.kts" -m 1)
        if [ -f "$APP_GRADLE" ]; then
          echo "Injecting UI libraries inside: $APP_GRADLE"
          sed -i '/dependencies {/a \    implementation("androidx.compose.material3:material3:1.2.1")' "$APP_GRADLE"
          sed -i '/dependencies {/a \    implementation("androidx.compose.material:material:1.6.8")' "$APP_GRADLE"
        fi

    # بدء بناء وتجميع التطبيق بصيغة APK مباشرة
    - name: Build Debug APK Only
      run: |
        GRADLEW_PATH=$(find . -name gradlew -print -quit)
        GRADLE_DIR=$(dirname "$GRADLEW_PATH")
        cd "$GRADLE_DIR"
        ./gradlew assembleDebug --no-daemon

    # استخراج ملف الـ APK ورفعه لتتمكن من تحميله مباشرة وتثبيته
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Landscaping-App-Debug-APK
        path: "**/build/outputs/apk/debug/app-debug.apk"
        retention-days: 7
