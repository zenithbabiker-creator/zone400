name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: 'gradle'

    - name: Find Project and Build
      run: |
        # 1. البحث عن مسار المشروع
        SETTINGS_FILE=$(find . -name "settings.gradle*" -print -quit)
        PROJECT_DIR=$(dirname "$SETTINGS_FILE")
        cd "$PROJECT_DIR"
        echo "Project found in: $PROJECT_DIR"

        # 2. إذا لم يكن gradlew موجوداً، سنقوم بتوليده فوراً
        if [ ! -f "gradlew" ]; then
          echo "gradlew not found. Generating wrapper..."
          gradle wrapper --gradle-version 8.7
        fi
        
        # 3. التأكد من صلاحية التنفيذ
        chmod +x gradlew

        # 4. بناء المشروع
        ./gradlew assembleDebug --no-daemon

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Landscaping-App-Debug-APK
        path: "**/build/outputs/apk/debug/app-debug.apk"
        retention-days: 7
