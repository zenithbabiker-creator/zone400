name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Build Project
        run: |
          # العثور على المجلد الذي يحتوي على gradlew
          GRADLEW_PATH=$(find . -name "gradlew" -print -quit)
          
          if [ -z "$GRADLEW_PATH" ]; then
            echo "خطأ: لم يتم العثور على ملف gradlew في أي مكان في المستودع!"
            echo "محتويات المجلد الحالي:"
            ls -R
            exit 1
          fi
          
          PROJECT_ROOT=$(dirname "$GRADLEW_PATH")
          echo "تم العثور على gradlew في: $PROJECT_ROOT"
          cd "$PROJECT_ROOT"
          
          # إعدادات التوافق
          echo "kotlin.plugin.suppressVersionCompatibilityCheck=true" >> gradle.properties
          
          # تنفيذ البناء
          chmod +x gradlew
          ./gradlew assembleDebug \
            -Pandroid.useAndroidX=true \
            -Pandroid.enableJetifier=true \
            -Dorg.gradle.jvmargs="-Xmx2048m -XX:MaxMetaspaceSize=512m" \
            -x lint

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Landscaping-App
          path: "**/build/outputs/apk/debug/app-debug.apk"
