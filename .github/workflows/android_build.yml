name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Grant execute permission for gradlew
        run: |
          # إضافة هذه الخطوة ضرورية جداً للعمل على بيئة GitHub Actions
          chmod +x LandscapeDesignApp/LandscapeDesignApp/gradlew

      - name: Build with Gradle
        run: |
          # الانتقال لمجلد المشروع
          cd LandscapeDesignApp/LandscapeDesignApp
          
          # 1. إصلاح ملف Manifest للتعارضات والأيقونة
          sed -i 's|android:icon="@mipmap/ic_launcher"|android:icon="@android:drawable/sym_def_app_icon"|g' app/src/main/AndroidManifest.xml
          sed -i 's|<manifest |<manifest xmlns:tools="http://schemas.android.com/tools" |g' app/src/main/AndroidManifest.xml
          sed -i 's|android:name="com.google.ar.core"|android:name="com.google.ar.core" tools:replace="android:value"|g' app/src/main/AndroidManifest.xml
          
          # 2. البناء مع تمرير الذاكرة وتخطي المهام غير الضرورية
          ./gradlew clean assembleDebug \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=1g" \
            -Pandroid.useAndroidX=true \
            -Pandroid.enableJetifier=true \
            -x lint -x test

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LandscapeDesignApp
          path: LandscapeDesignApp/LandscapeDesignApp/app/build/outputs/apk/debug/app-debug.apk
