name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Build Project
        run: |
          # الانتقال للمجلد الذي حددته سابقاً في الـ logs
          cd LandscapeDesignApp/LandscapeDesignApp
          
          # التحقق من وجود الملف قبل محاولة تنفيذه
          if [ -f "gradlew" ]; then
            echo "Gradlew found!"
          else
            echo "Gradlew not found in $(pwd)! Listing files:"
            ls -F
            exit 1
          fi
          
          # إعدادات التوافق
          echo "kotlin.plugin.suppressVersionCompatibilityCheck=true" >> gradle.properties
          
          # تنفيذ البناء
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon -Pandroid.useAndroidX=true -Pandroid.enableJetifier=true -Dorg.gradle.jvmargs="-Xmx2048m -XX:MaxMetaspaceSize=512m" -x lint

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Landscaping-App
          path: "**/build/outputs/apk/debug/app-debug.apk"
